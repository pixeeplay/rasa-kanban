<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kanban RASA</title>
<style>
:root{--bg:#0f1220;--panel:#171a2b;--panel2:#1e2238;--line:#2a2f4a;--txt:#e7e9f3;--mut:#9aa0bd;
--todo:#f0a04b;--doing:#4b9bf0;--done:#3ecf8e;--accent:#7c5cff;}
*{box-sizing:border-box}
body{margin:0;font:14px/1.45 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--txt)}
header{display:flex;align-items:center;gap:14px;padding:12px 18px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
header h1{font-size:17px;margin:0;letter-spacing:.3px}
header .sp{flex:1}
.btn{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:9px;padding:7px 12px;cursor:pointer;font-size:13px}
.btn:hover{border-color:var(--accent)}
.btn.p{background:var(--accent);border-color:var(--accent)}
select{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:9px;padding:7px 10px}
.wrap{padding:16px;max-width:1400px;margin:0 auto}
.board{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:18px}
.board h2{margin:0 0 12px;font-size:15px;display:flex;align-items:center;gap:10px}
.board h2 .dot{width:9px;height:9px;border-radius:50%;background:var(--accent)}
.cols{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.col{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:10px;min-height:90px}
.col h3{margin:0 0 9px;font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--mut);display:flex;justify-content:space-between}
.col.todo h3 span.k{color:var(--todo)} .col.doing h3 span.k{color:var(--doing)} .col.done h3 span.k{color:var(--done)}
.col.drop{outline:2px dashed var(--accent);outline-offset:-4px}
.card{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:9px;padding:9px 10px;margin-bottom:8px;cursor:grab}
.card.todo{border-left-color:var(--todo)} .card.doing{border-left-color:var(--doing)} .card.done{border-left-color:var(--done)}
.card:active{cursor:grabbing}
.card .t{font-weight:600}
.card .d{color:var(--mut);font-size:12.5px;margin-top:3px;white-space:pre-wrap}
.card .r{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.chip{font-size:11px;color:var(--mut);border:1px solid var(--line);border-radius:20px;padding:1px 8px}
.x{color:var(--mut);cursor:pointer;border:none;background:none;font-size:15px}
.x:hover{color:#ff6b6b}
.add{width:100%;text-align:left;color:var(--mut);background:none;border:1px dashed var(--line);border-radius:8px;padding:7px;cursor:pointer;margin-top:2px}
.add:hover{color:var(--txt);border-color:var(--accent)}
.drawer{position:fixed;top:0;right:-380px;width:360px;height:100%;background:var(--panel);border-left:1px solid var(--line);transition:right .2s;z-index:30;overflow:auto;padding:16px}
.drawer.open{right:0}
.h-item{border-bottom:1px solid var(--line);padding:8px 0;font-size:13px}
.h-item .m{color:var(--mut);font-size:11.5px}
.badge{font-size:11px;padding:1px 7px;border-radius:20px;border:1px solid var(--line)}
#toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--line);padding:9px 14px;border-radius:10px;opacity:0;transition:.2s;z-index:40}
#toast.show{opacity:1}
.mut{color:var(--mut)}
dialog{background:var(--panel);color:var(--txt);border:1px solid var(--line);border-radius:12px;padding:16px;width:min(520px,92vw)}
dialog input,dialog textarea,dialog select{width:100%;margin:6px 0 12px;background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:8px}
.sugg{border:1px solid var(--line);border-radius:9px;padding:9px;margin-bottom:8px}
.sugg .row{display:flex;gap:8px;align-items:center;justify-content:space-between}
</style>
</head>
<body>
<header>
  <h1>🗂️ Kanban RASA</h1>
  <span class="badge" id="whoBadge"></span>
  <span class="sp"></span>
  <button class="btn" id="aiAll">✨ Idées IA</button>
  <button class="btn" id="histBtn">🕓 Historique</button>
  <span class="mut" id="save">—</span>
</header>
<div class="wrap" id="boards"></div>
<div class="drawer" id="drawer"><h2 style="margin-top:0">🕓 Historique</h2><div id="hist"></div></div>
<div id="toast"></div>
<script src="/static/app.js"></script>
</body>
</html>
